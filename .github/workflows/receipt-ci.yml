name: Receipt CI

on:
  workflow_call:
    inputs:
      upload_artifact:
        type: boolean
        default: true
        description: Upload receipt artifacts
      output_dir:
        type: string
        default: receipts
        description: Output directory for receipts

jobs:
  receipt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Generate CI receipt
        run: npx rf make ci --from github --output ${{ inputs.output_dir }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: inputs.upload_artifact
        with:
          name: receipts
          path: ${{ inputs.output_dir }}/
