name: CI

on:
  push:
    paths:
      - "packages/**"
      - "pipelines/**"
      - "apps/**"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - "tsconfig.base.json"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "packages/**"
      - "pipelines/**"
      - "apps/**"
      - "pnpm-lock.yaml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      - name: Pack dry-run (publishable packages)
        run: |
          for pkg in packages/core packages/render packages/verify packages/sign packages/adapters/github apps/factory-cli; do
            echo "--- $pkg ---"
            cd $pkg
            npm pack --dry-run 2>&1
            cd $GITHUB_WORKSPACE
          done
